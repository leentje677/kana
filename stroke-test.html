<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stroke Order Test</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #58A68A;
    --text: #445D52;
    --soft: #7A968A;
    --card: rgba(255,255,255,0.96);
    --progress-bg: #E0EADE;
    --overlay: rgba(137,179,161,0.45);
    --radius-md: 16px;
    --radius-lg: 24px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(var(--overlay), var(--overlay)),
                linear-gradient(150deg, #6fa090 0%, #89B3A1 60%, #7aa898 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    margin: 0; padding: 16px;
  }

  .card {
    background: var(--card);
    border-radius: 28px;
    padding: 24px 22px 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  /* ── Header ─────────────────────────────────────────── */
  .header {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
  }

  h1 {
    font-size: 20px; font-weight: 800; margin: 0; color: var(--text);
  }

  .test-badge {
    background: #E67E22; color: white;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 99px;
  }

  /* ── Character selector ──────────────────────────────── */
  .char-selector {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }

  .char-btn {
    width: 48px; height: 48px;
    border: 2px solid var(--progress-bg);
    border-radius: var(--radius-md);
    background: var(--card);
    font-size: 26px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    color: var(--text);
    font-family: sans-serif;
  }
  .char-btn:hover  { border-color: var(--primary); }
  .char-btn.active { border-color: var(--primary); background: rgba(88,166,138,0.1); box-shadow: 0 0 0 2px rgba(88,166,138,0.3); }

  /* ── Stroke dots ─────────────────────────────────────── */
  .stroke-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: var(--soft);
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%; border: 2px solid;
    opacity: 0.22; transition: all 0.3s;
  }
  .dot.active { opacity: 1; transform: scale(1.35); }
  .dot.done   { opacity: 1; }

  /* ── Canvas ──────────────────────────────────────────── */
  .wrap {
    position: relative; width: 300px; height: 300px;
    border-radius: 18px; background: #f5faf7;
    border: 2px solid rgba(88,166,138,0.18);
    overflow: hidden; cursor: crosshair; touch-action: none;
  }
  .wrap::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(rgba(88,166,138,0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,138,0.055) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none; z-index: 0;
  }
  /* Centre guides */
  .wrap::after {
    content: ''; position: absolute;
    top: 0; bottom: 0; left: 50%; width: 1px;
    background: rgba(88,166,138,0.08);
    pointer-events: none; z-index: 0;
  }
  canvas { position: absolute; inset: 0; z-index: 1; }

  /* ── Status ──────────────────────────────────────────── */
  .status {
    font-size: 13px; font-weight: 700; color: var(--soft);
    text-align: center; min-height: 18px; transition: color 0.25s;
    padding: 0 8px;
  }
  .status.ok   { color: var(--primary); }
  .status.bad  { color: #c0688a; }
  .status.done { color: var(--primary); font-size: 16px; }

  /* ── Legend ──────────────────────────────────────────── */
  .legend {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--soft);
  }
  .leg { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 16px; height: 3px; border-radius: 2px; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btns { display: flex; gap: 10px; width: 100%; }
  button.action {
    flex: 1; padding: 12px; border: none; border-radius: 15px;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.08);
    transition: all 0.15s;
  }
  button.action:active { transform: translateY(2px); box-shadow: none; }
  #btn-reset   { background: var(--progress-bg); color: var(--text); }
  #btn-animate { background: var(--primary); color: white; }

  @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .flash { animation: flash 0.4s ease; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <h1 id="title">Trace あ</h1>
    <span class="test-badge">Stroke Order Test</span>
  </div>

  <div class="char-selector" id="char-selector"></div>

  <div class="stroke-row">
    <span>Stroke:</span>
    <div id="dots"></div>
  </div>

  <div class="wrap" id="wrap">
    <canvas id="c-ghost" width="300" height="300"></canvas>
    <canvas id="c-done"  width="300" height="300"></canvas>
    <canvas id="c-draw"  width="300" height="300"></canvas>
  </div>

  <div class="status" id="status"></div>

  <div class="legend" id="legend"></div>

  <div class="btns">
    <button class="action" id="btn-reset">↺ Reset</button>
    <button class="action" id="btn-animate">▶ Show me</button>
  </div>

</div>
<script>
const STROKE_COLORS = [
  '#58A68A',   // sage primary
  '#E67E22',   // amber (hint colour)
  '#C0688A',   // rose  (MC colour)
];

// ─── Character data ───────────────────────────────────────────────────────────
// KanjiVG paths (© Ulrich Apel, CC-BY-SA 3.0), viewBox 0 0 109 109
const CHARACTERS = [
  {
    char: 'あ',
    strokes: [
      {
        d: "M31.01,33c0.88,0.88,2.75,1.82,5.25,1.75c8.62-0.25,20-2.12,29.5-4.25c1.51-0.34,4.62-0.88,6.62-0.5",
        color: STROKE_COLORS[0],
        label: 'Short horizontal bar — draw left → right',
        next:  '✓ Now draw stroke 2 — the tall left curve',
        needsLR: true,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M49.76,17.62c0.88,1,1.82,3.26,1.38,5.25c-3.75,16.75-6.25,38.13-5.13,53.63c0.41,5.7,1.88,10.88,3.38,13.62",
        color: STROKE_COLORS[1],
        label: 'Tall left curve — draw top → bottom',
        next:  '✓ Now draw stroke 3 — the big loop',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M65.63,44.12c0.75,1.12,1.16,4.39,0.5,6.12c-4.62,12.26-11.24,23.76-25.37,35.76c-6.86,5.83-15.88,3.75-16.25-8.38c-0.34-10.87,13.38-23.12,32.38-26.74c12.42-2.37,27,1.38,30.5,12.75c4.05,13.18-3.76,26.37-20.88,30.49",
        color: STROKE_COLORS[2],
        label: 'Big looping body — trace the full loop',
        next:  '',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
    ],
  },
  {
    char: 'い',
    strokes: [
      {
        d: "M21.5,29.66c2.01,2.17,2.61,4.68,2.17,7.43c-3.09,19.16-1.03,32.01,7.93,41.45c6.12,6.45,6.26,3.14,7.04-5.21",
        color: STROKE_COLORS[0],
        label: 'Left stroke — draw top → bottom with curve',
        next:  '✓ Now draw stroke 2 — the right curve',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M72.96,36.51c9.44,8.05,17.79,18.82,18.41,33.83",
        color: STROKE_COLORS[1],
        label: 'Right curve — draw top → bottom',
        next:  '',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
    ],
  },
  {
    char: 'う',
    strokes: [
      {
        d: "M42,15.5c5.62,2.12,9.62,3,12.88,3c8.27,0,8,1.12-0.38,5.5",
        color: STROKE_COLORS[0],
        label: 'Short top stroke — draw left → right with hook',
        next:  '✓ Now draw stroke 2 — the main curved body',
        needsLR: true,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M33,42.38c2.12,1.12,4.12,2.88,8.5,1.38c4.38-1.5,12.75-7.12,18.5-7c5.75,0.12,10.25,5,10.25,18c0,15.49-8.25,30.24-24.37,41.24",
        color: STROKE_COLORS[1],
        label: 'Main body — curve right then sweep down-left',
        next:  '',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
    ],
  },
  {
    char: 'え',
    strokes: [
      {
        d: "M40.52,13.25c5.62,2.12,10,3,14.12,3c8.27,0,8,1.12-0.38,5.5",
        color: STROKE_COLORS[0],
        label: 'Short top stroke — draw left → right with hook',
        next:  '✓ Now draw stroke 2 — the big sweeping body',
        needsLR: true,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M32.52,45.12c1.88,1.25,4.5,1.75,7.38,0.62c3.29-1.29,17-7.88,21.25-9.88c4.25-2,8.32,0.04,4.38,4.62c-12.26,14.27-27.26,31.52-39.51,44.4c-3.26,3.42-0.58,3.54,1.5,1.37c13.5-14.12,18.12-20.12,23.62-20.12c7.13,0,3.5,16.75,6.75,22.38c3.25,5.63,19.12,3.75,26.12,2.12",
        color: STROKE_COLORS[1],
        label: 'Big sweeping stroke — follow the full curve',
        next:  '',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
    ],
  },
  {
    char: 'お',
    strokes: [
      {
        d: "M22.88,35.12c1.38,1,3.62,2.38,6,2.12c2.38-0.26,19.62-5.12,21.12-5.74c1.5-0.62,4-1.25,5.88-2",
        color: STROKE_COLORS[0],
        label: 'Horizontal stroke — draw left → right',
        next:  '✓ Now draw stroke 2 — the long vertical sweep',
        needsLR: true,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M41.5,16.12c2.25,1,3.59,4.39,3.12,7.38c-2.5,16.12-3.37,45.53-2.25,58.38c0.75,8.62-0.64,10.45-7.12,7.12c-5.13-2.62-13.75-8-13.75-12.38c0-7.5,24.38-23.62,44.75-23.62c17.25,0,25,8.25,25,17.25c0,8.25-9.38,18.88-26.75,21",
        color: STROKE_COLORS[1],
        label: 'Long vertical sweep — top to bottom then loop right',
        next:  '✓ Now draw stroke 3 — the short top-right stroke',
        needsLR: false,
        tol: 0, minCov: 0.60,
      },
      {
        d: "M73,22.12c5.38,2.62,8.88,5.88,10.62,8.25c2.27,3.08,0.38,4.5-1.12,5",
        color: STROKE_COLORS[2],
        label: 'Short top-right stroke — draw left → right',
        next:  '',
        needsLR: true,
        tol: 0, minCov: 0.60,
      },
    ],
  },
];

// ─── Stroke colour palette (matches KitsuKana design tokens) ─────────────────
const SCALE = 300 / 109;

// ─── State ────────────────────────────────────────────────────────────────────
let charIdx = 0;
let cur = 0, drawing = false, pts = [], done = false, animId = null;

// ─── SVG path parser → sampled points ────────────────────────────────────────
function parseSvgPath(d, n = 120) {
  const pts = [];
  const tokens = d.trim().match(/[MmCcLlZz]|[-+]?[0-9]*\.?[0-9]+/g);
  if (!tokens) return pts;
  let x = 0, y = 0, i = 0;
  while (i < tokens.length) {
    const cmd = tokens[i++];
    if (cmd === 'M') {
      x = +tokens[i++]; y = +tokens[i++];
      pts.push([x * SCALE, y * SCALE]);
    } else if (cmd === 'm') {
      x += +tokens[i++]; y += +tokens[i++];
      pts.push([x * SCALE, y * SCALE]);
    } else if (cmd === 'c') {
      while (i < tokens.length && !isNaN(+tokens[i])) {
        const d1x=+tokens[i++],d1y=+tokens[i++],d2x=+tokens[i++],d2y=+tokens[i++],dx=+tokens[i++],dy=+tokens[i++];
        sampleCubic(x,y, x+d1x,y+d1y, x+d2x,y+d2y, x+dx,y+dy, pts, n);
        x+=dx; y+=dy;
      }
    } else if (cmd === 'C') {
      while (i < tokens.length && !isNaN(+tokens[i])) {
        const cp1x=+tokens[i++],cp1y=+tokens[i++],cp2x=+tokens[i++],cp2y=+tokens[i++],ex=+tokens[i++],ey=+tokens[i++];
        sampleCubic(x,y,cp1x,cp1y,cp2x,cp2y,ex,ey,pts,n);
        x=ex; y=ey;
      }
    }
  }
  return pts;
}

function sampleCubic(x0,y0,cp1x,cp1y,cp2x,cp2y,ex,ey,pts,n) {
  const steps = Math.max(20, Math.floor(n/3));
  for (let t=1;t<=steps;t++) {
    const u=t/steps,m=1-u;
    pts.push([
      (m*m*m*x0+3*m*m*u*cp1x+3*m*u*u*cp2x+u*u*u*ex)*SCALE,
      (m*m*m*y0+3*m*m*u*cp1y+3*m*u*u*cp2y+u*u*u*ey)*SCALE,
    ]);
  }
}

// ─── Draw a stroke path using Path2D + ctx.scale ──────────────────────────────
function drawPath(ctx, pathObj, {alpha=1, w=8, color='#000', glow=false}={}) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = w / SCALE;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 6/SCALE; }
  ctx.scale(SCALE, SCALE);
  ctx.stroke(pathObj);
  ctx.restore();
}

// ─── Ghost layer ──────────────────────────────────────────────────────────────
function renderGhost(activeIdx) {
  gCtx.clearRect(0, 0, 300, 300);
  const strokes = CHARACTERS[charIdx].strokes;
  const paths   = currentPaths();
  const samples = currentSamples();

  strokes.forEach((s, i) => {
    if (i < activeIdx) return;
    const isActive = i === activeIdx;

    drawPath(gCtx, paths[i], { alpha: isActive ? 0.13 : 0.06, w: 14, color: '#000' });
    if (isActive) {
      drawPath(gCtx, paths[i], { alpha: 0.26, w: 10, color: s.color });
      const sp = samples[i][0];
      // Start dot
      gCtx.save();
      gCtx.beginPath(); gCtx.arc(sp[0], sp[1], 7, 0, Math.PI*2);
      gCtx.fillStyle = s.color; gCtx.globalAlpha = 0.6; gCtx.fill();
      gCtx.restore();
      // Direction arrow
      const sp2 = samples[i][Math.min(6, samples[i].length-1)];
      const angle = Math.atan2(sp2[1]-sp[1], sp2[0]-sp[0]);
      gCtx.save();
      gCtx.translate(sp[0], sp[1]); gCtx.rotate(angle);
      gCtx.fillStyle = s.color; gCtx.globalAlpha = 0.8;
      gCtx.beginPath(); gCtx.moveTo(12,0); gCtx.lineTo(-4,-5); gCtx.lineTo(-4,5);
      gCtx.closePath(); gCtx.fill();
      gCtx.restore();
    }
    // Number badge
    const sp = samples[i][0];
    gCtx.save();
    gCtx.beginPath(); gCtx.arc(sp[0]-14, sp[1]-14, 9, 0, Math.PI*2);
    gCtx.fillStyle = s.color; gCtx.globalAlpha = isActive ? 0.85 : 0.28; gCtx.fill();
    gCtx.fillStyle = 'white'; gCtx.globalAlpha = 1;
    gCtx.font = 'bold 10px sans-serif';
    gCtx.textAlign = 'center'; gCtx.textBaseline = 'middle';
    gCtx.fillText(String(i+1), sp[0]-14, sp[1]-14);
    gCtx.restore();
  });
}

// ─── Evaluate stroke ──────────────────────────────────────────────────────────
function pathLength(samples) {
  let len = 0;
  for (let i = 1; i < samples.length; i++) {
    len += Math.hypot(samples[i][0]-samples[i-1][0], samples[i][1]-samples[i-1][1]);
  }
  return len;
}

function evaluate(stroke, samples, userPts) {
  if (userPts.length < 6) return false;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for (const [px,py] of userPts) {
    minX=Math.min(minX,px); maxX=Math.max(maxX,px);
    minY=Math.min(minY,py); maxY=Math.max(maxY,py);
  }
  if (Math.max(maxX-minX,maxY-minY) < 18) return false;
  if (stroke.needsLR && userPts[userPts.length-1][0]-userPts[0][0] < 18) return false;

  // Auto-tol: short strokes get slightly more tolerance so they aren't unfairly hard
  const pLen = pathLength(samples);
  const tol = pLen < 80 ? 22 : 18;   // short stroke: 22px, long stroke: 18px

  let covered = 0;
  for (const ref of samples) {
    if (userPts.some(([px,py]) => Math.hypot(px-ref[0],py-ref[1]) < tol)) covered++;
  }
  return covered/samples.length >= stroke.minCov;
}

// ─── Helper: current char's paths and samples ─────────────────────────────────
let _pathCache = {}, _sampleCache = {};

function currentPaths() {
  if (!_pathCache[charIdx]) {
    _pathCache[charIdx] = CHARACTERS[charIdx].strokes.map(s => new Path2D(s.d));
  }
  return _pathCache[charIdx];
}

function currentSamples() {
  if (!_sampleCache[charIdx]) {
    _sampleCache[charIdx] = CHARACTERS[charIdx].strokes.map(s => parseSvgPath(s.d, 120));
  }
  return _sampleCache[charIdx];
}

// ─── Build UI for current character ──────────────────────────────────────────
function buildUI() {
  const ch = CHARACTERS[charIdx];
  document.getElementById('title').textContent = `Trace ${ch.char}`;

  // Stroke dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  dotsEl.style.display = 'flex'; dotsEl.style.gap = '8px';
  ch.strokes.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = `dot-${i+1}`;
    d.style.background = s.color;
    d.style.borderColor = s.color;
    dotsEl.appendChild(d);
  });

  // Legend
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  ch.strokes.forEach((s, i) => {
    const leg = document.createElement('div');
    leg.className = 'leg';
    leg.innerHTML = `<div class="swatch" style="background:${s.color}"></div>Stroke ${i+1}`;
    legendEl.appendChild(leg);
  });

  // Status
  statusEl.textContent = ch.strokes[0].label;
  statusEl.className = 'status';
}

// ─── Canvas & DOM refs ────────────────────────────────────────────────────────
const wrap = document.getElementById('wrap');
const gCtx = document.getElementById('c-ghost').getContext('2d');
const dCtx = document.getElementById('c-done').getContext('2d');
const rCtx = document.getElementById('c-draw').getContext('2d');
const statusEl = document.getElementById('status');

// ─── Pointer events ───────────────────────────────────────────────────────────
function getPos(e) {
  const r = wrap.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX-r.left)*(300/r.width), (src.clientY-r.top)*(300/r.height)];
}

function onStart(e) {
  if (done) return; e.preventDefault();
  drawing = true; pts = [getPos(e)];
  rCtx.clearRect(0, 0, 300, 300);
}

function onMove(e) {
  if (!drawing) return; e.preventDefault();
  pts.push(getPos(e));
  rCtx.clearRect(0, 0, 300, 300);
  rCtx.save();
  rCtx.strokeStyle = CHARACTERS[charIdx].strokes[cur].color;
  rCtx.lineWidth = 9; rCtx.lineCap = 'round'; rCtx.lineJoin = 'round';
  rCtx.beginPath(); rCtx.moveTo(...pts[0]);
  for (let i=1;i<pts.length;i++) rCtx.lineTo(...pts[i]);
  rCtx.stroke(); rCtx.restore();
}

function onEnd(e) {
  if (!drawing) return; e.preventDefault();
  drawing = false; rCtx.clearRect(0, 0, 300, 300);

  const strokes = CHARACTERS[charIdx].strokes;
  const samples = currentSamples();
  const ok = evaluate(strokes[cur], samples[cur], pts);

  if (ok) {
    dCtx.save();
    dCtx.strokeStyle = strokes[cur].color;
    dCtx.lineWidth = 9; dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
    dCtx.shadowColor = strokes[cur].color; dCtx.shadowBlur = 8;
    dCtx.beginPath(); dCtx.moveTo(...pts[0]);
    for (let i=1;i<pts.length;i++) dCtx.lineTo(...pts[i]);
    dCtx.stroke(); dCtx.restore();

    document.getElementById(`dot-${cur+1}`).className = 'dot done';
    document.getElementById(`dot-${cur+1}`).style.background = strokes[cur].color;
    document.getElementById(`dot-${cur+1}`).style.borderColor = strokes[cur].color;
    cur++;

    if (cur < strokes.length) {
      const dot = document.getElementById(`dot-${cur+1}`);
      dot.className = 'dot active';
      dot.style.background = strokes[cur].color;
      dot.style.borderColor = strokes[cur].color;
      statusEl.textContent = strokes[cur-1].next;
      statusEl.className = 'status ok';
      renderGhost(cur);
    } else {
      done = true;
      gCtx.clearRect(0, 0, 300, 300);
      statusEl.textContent = `${CHARACTERS[charIdx].char} — Perfect! All strokes done 🎉`;
      statusEl.className = 'status done';
    }
  } else {
    statusEl.textContent = 'Not quite — follow the coloured guide';
    statusEl.className = 'status bad';
    wrap.classList.add('flash');
    setTimeout(() => wrap.classList.remove('flash'), 400);
  }
}

wrap.addEventListener('mousedown',  onStart);
wrap.addEventListener('mousemove',  onMove);
wrap.addEventListener('mouseup',    onEnd);
wrap.addEventListener('mouseleave', onEnd);
wrap.addEventListener('touchstart', onStart, {passive:false});
wrap.addEventListener('touchmove',  onMove,  {passive:false});
wrap.addEventListener('touchend',   onEnd,   {passive:false});

// ─── Reset ────────────────────────────────────────────────────────────────────
function reset() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  cur = 0; drawing = false; pts = []; done = false;
  gCtx.clearRect(0,0,300,300);
  dCtx.clearRect(0,0,300,300);
  rCtx.clearRect(0,0,300,300);
  buildUI();
  renderGhost(0);
}

// ─── Character selector ───────────────────────────────────────────────────────
function buildSelector() {
  const sel = document.getElementById('char-selector');
  CHARACTERS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'char-btn' + (i === 0 ? ' active' : '');
    btn.textContent = ch.char;
    btn.title = `Practice ${ch.char}`;
    btn.addEventListener('click', () => {
      if (charIdx === i) return;
      charIdx = i;
      document.querySelectorAll('.char-btn').forEach((b,j) =>
        b.className = 'char-btn' + (j === i ? ' active' : ''));
      reset();
    });
    sel.appendChild(btn);
  });
}

// ─── Animate demo ─────────────────────────────────────────────────────────────
function animateDemo() {
  reset();
  const strokes = CHARACTERS[charIdx].strokes;
  const samples = currentSamples();
  let si = 0;

  function nextStroke() {
    if (si >= strokes.length) {
      done = true;
      gCtx.clearRect(0,0,300,300);
      statusEl.textContent = `That's ${CHARACTERS[charIdx].char}! Tap Reset to try yourself.`;
      statusEl.className = 'status done';
      return;
    }
    const s = strokes[si]; const samps = samples[si];
    statusEl.textContent = `Watching stroke ${si+1}…`;
    renderGhost(si);
    let f = 0;

    function frame() {
      if (f >= samps.length) {
        document.getElementById(`dot-${si+1}`).className = 'dot done';
        cur = si+1; si++;
        if (si < strokes.length) {
          const dot = document.getElementById(`dot-${si+1}`);
          dot.className = 'dot active';
        }
        setTimeout(nextStroke, 450);
        return;
      }
      dCtx.save();
      dCtx.strokeStyle = s.color; dCtx.lineWidth = 9;
      dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
      dCtx.shadowColor = s.color; dCtx.shadowBlur = 7;
      dCtx.beginPath();
      if (f===0) { dCtx.moveTo(...samps[0]); }
      else { dCtx.moveTo(...samps[f-1]); dCtx.lineTo(...samps[f]); }
      dCtx.stroke(); dCtx.restore();
      f++; animId = requestAnimationFrame(frame);
    }
    frame();
  }
  setTimeout(nextStroke, 300);
}

document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-animate').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  animateDemo();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
buildSelector();
reset();
</script>
